name: Release Chart

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - "chart/**"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release Helm Chart
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # Allow chart-releaser to write to gh-pages and create releases
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.17.1

      - name: Configure Git
        # chart-releaser writes a commit to the gh-pages branch when updating
        # the chart index; without an identity, `git commit` fails with
        # "empty ident name not allowed".
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          # Our single chart lives at chart/Chart.yaml. chart-releaser scans
          # `charts_dir/*/Chart.yaml`, so we point it at the repo root and
          # rely on the per-chart Chart.yaml discovery. The default of
          # "charts" silently finds nothing in this repo.
          charts_dir: .
          config: .github/cr.yaml
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install helm-docs
        uses: ./.github/actions/setup-helm-docs

      - name: Update Chart README
        working-directory: chart
        # The whole point of this step is to detect drift in chart/README.md
        # so the next step can open a docs PR. We do NOT want to fail on diff;
        # helm-docs 1.14.2 has no --fail-on-diff flag and silently ignores the
        # config-file equivalent, so we simply run it bare.
        run: |
          helm-docs

      - name: Detect README diff
        id: docs-diff
        run: |
          if git diff --quiet -- chart/README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.docs-diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: update chart documentation"
          title: "docs: update chart documentation"
          body: "Automated update of Helm chart documentation"
          branch: "update-helm-docs"
          delete-branch: true
          base: main
