name: Lint and Test Chart

on:
  pull_request:
    paths:
      - "chart/**"
      - ".github/workflows/*.y*ml"

jobs:
  build:
    name: lint, install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.17.1

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Install helm-docs
        run: |
          set -euo pipefail
          HELM_DOCS_VERSION=1.14.2
          curl -sSL -o /tmp/helm-docs.tgz \
            "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz"
          tar -xzf /tmp/helm-docs.tgz -C /tmp helm-docs
          sudo install -m 0755 /tmp/helm-docs /usr/local/bin/helm-docs
          # No version probe: helm-docs 1.14.2 has no --version flag; tar above
          # already fails loudly if the binary is missing.

      - name: Run helm-docs check
        working-directory: chart
        run: |
          helm-docs
          git diff --exit-code

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed="$(ct list-changed --config chart/ct.yaml)"
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "changed_list<<EOF"
              echo "$changed"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        run: ct lint --debug --config chart/ct.yaml

      - name: Create kind cluster
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        if: steps.list-changed.outputs.changed == 'true'

      - name: Apply Prometheus Operator CRDs
        if: |
          steps.list-changed.outputs.changed == 'true' &&
          !contains(steps.list-changed.outputs.changed_list, 'prometheus-operator-crds') &&
          !contains(steps.list-changed.outputs.changed_list, 'kube-prometheus-stack')
        run: |
          helm install prometheus-operator-crds oci://ghcr.io/prometheus-community/charts/prometheus-operator-crds --wait

      - name: Run chart-testing (install)
        run: ct install --debug --config chart/ct.yaml
        if: steps.list-changed.outputs.changed == 'true'
