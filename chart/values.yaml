# Default values for mimir-sync.
# This is a YAML-formatted file.
# For the full reference, see: https://github.com/antnsn/mimir-sync

# -- Override the chart name (defaults to .Chart.Name).
nameOverride: ""
# -- Override the fully qualified app name.
fullnameOverride: ""

# -- Common labels applied to every resource rendered by this chart.
commonLabels: {}
# -- Common annotations applied to every resource rendered by this chart.
# Note: Reloader annotations on Jobs are merged with these.
commonAnnotations: {}

# Image used by every sync Job.
image:
  # -- Image repository for the mal-sync wrapper around mimirtool/lokitool.
  repository: ghcr.io/antnsn/mal-sync
  # -- Image tag. When empty, the chart falls back to .Chart.AppVersion so the
  # image stays pinned to a chart release. Set explicitly to override.
  tag: ""
  # -- Image pull policy.
  pullPolicy: IfNotPresent

# -- Pod-level securityContext applied to all Job pods (toYaml'd as-is).
securityContext: {}

# RBAC configuration. The Jobs themselves do NOT call the Kubernetes API; this
# is opt-in for setups that wire Reloader (or similar) to use this SA to watch
# the chart's ConfigMaps/Secrets within the release namespace.
rbac:
  # -- Create namespace-scoped Role and RoleBinding granting read access to the
  # ConfigMaps/Secrets this chart manages. Most users can leave this enabled.
  create: true

# ServiceAccount used by every sync Job.
serviceAccount:
  # -- Create a dedicated ServiceAccount.
  create: true
  # -- Annotations to add to the ServiceAccount.
  annotations: {}
  # -- Name of the ServiceAccount. If empty and create=true, a name is derived
  # from the fullname template.
  name: ""

# Mimir API connection settings shared by alertmanager and rules sync Jobs.
mimir:
  # -- Mimir API endpoint.
  address: http://mimir-distributed-nginx.mimir.svc.cluster.local:80
  # -- Mimir tenant ID (X-Scope-OrgID).
  tenantId: anonymous
  # -- Optional Mimir basic-auth username.
  user: ""
  # -- Optional Mimir basic-auth password. Prefer existingSecret in production.
  password: ""
  # Reference an existing Secret for the Mimir password.
  existingSecret:
    # -- Name of an existing Secret containing the Mimir password.
    name: ""
    # -- Key inside the Secret that holds the password.
    key: ""

# Loki API connection settings used by the loki-rules sync Job.
loki:
  # -- Loki API endpoint.
  address: http://loki-distributed-gateway.loki.svc.cluster.local
  # -- Loki tenant ID (X-Scope-OrgID).
  tenantId: anonymous
  # -- Optional Loki basic-auth username.
  user: ""
  # -- Optional Loki basic-auth password. Prefer existingSecret in production.
  password: ""
  # Reference an existing Secret for the Loki password.
  existingSecret:
    # -- Name of an existing Secret containing the Loki password.
    name: ""
    # -- Key inside the Secret that holds the password.
    key: ""

# Namespaces in which rules are loaded into Mimir/Loki (not Kubernetes namespaces).
namespaces:
  # -- Mimir rules namespace (--rules.namespace for mimir-rules).
  mimir: default
  # -- Loki rules namespace (--rules.namespace for loki-rules).
  loki: default

# Alertmanager sync configuration.
alertmanager:
  # -- Enable the Alertmanager sync Job.
  enabled: true

  # -- Image pull secrets for the alertmanager sync Job.
  imagePullSecrets: []
  # -- Node selector for the alertmanager sync Job.
  nodeSelector: {}
  # -- Affinity rules for the alertmanager sync Job.
  affinity: {}
  # -- Tolerations for the alertmanager sync Job.
  tolerations: []
  # -- Topology spread constraints for the alertmanager sync Job.
  topologySpreadConstraints: []
  # -- Resource requests and limits for the alertmanager sync Job.
  resources: {}

  # Source for the Alertmanager configuration.
  config:
    # -- One of: configmap, secret, none. "none" disables the built-in mount
    # (use extraVolumes/extraVolumeMounts to provide your own).
    type: secret
    # -- Use an existing ConfigMap/Secret instead of letting the chart create one.
    existingName: ""
    # -- Key inside the ConfigMap/Secret that holds the Alertmanager config.
    key: config.yml

  # -- Alertmanager configuration content (YAML string). Used only when
  # config.type is "configmap" or "secret" and config.existingName is empty.
  configContent: ""

  # -- Path inside the container where Alertmanager templates are mounted.
  templatesPathInContainer: /etc/alertmanager/templates
  # -- Optional temp dir used by mal-sync.
  syncTempDir: ""

  # -- Extra environment variables for the alertmanager sync Job.
  extraEnv: []
  # -- Extra volumes for the alertmanager sync Job.
  extraVolumes: []
  # -- Extra volume mounts for the alertmanager sync Job.
  extraVolumeMounts: []

  # -- Job .spec.backoffLimit.
  backoffLimit: 2
  # -- Job .spec.ttlSecondsAfterFinished (auto-GC of completed jobs).
  ttlSecondsAfterFinished: 3600

# Mimir rules sync configuration.
rules:
  # -- Enable the Mimir rules sync Job.
  enabled: true

  # -- Image pull secrets for the rules sync Job.
  imagePullSecrets: []
  # -- Node selector for the rules sync Job.
  nodeSelector: {}
  # -- Affinity rules for the rules sync Job.
  affinity: {}
  # -- Tolerations for the rules sync Job.
  tolerations: []
  # -- Topology spread constraints for the rules sync Job.
  topologySpreadConstraints: []
  # -- Resource requests and limits for the rules sync Job.
  resources: {}

  # Source for the Prometheus rules.
  config:
    # -- One of: configmap, secret, none.
    type: secret
    # -- Use an existing ConfigMap/Secret instead of letting the chart create one.
    existingName: ""
    # -- Key inside the ConfigMap/Secret that holds the rules (informational
    # only when mounting a directory of files).
    key: rules.yml

  # -- Path inside the container where rule files are mounted (passed to
  # mal-sync as --rules.path).
  rulesPath: /rules

  # -- Optional temp dir used by mal-sync.
  syncTempDir: ""

  # -- Prometheus rule files. Each map key becomes a file inside the generated
  # ConfigMap/Secret. Used only when config.existingName is empty.
  rules: {}
  # rules:
  #   node.yml: |
  #     groups:
  #       - name: node-exporter
  #         rules:
  #           - alert: NodeDown
  #             expr: up{job=~"k8s-nodes|external-servers"} == 0
  #             for: 2m
  #             labels:
  #               severity: critical

  # -- Extra environment variables for the rules sync Job.
  extraEnv: []
  # -- Extra volumes for the rules sync Job.
  extraVolumes: []
  # -- Extra volume mounts for the rules sync Job.
  extraVolumeMounts: []

  # -- Job .spec.backoffLimit.
  backoffLimit: 2
  # -- Job .spec.ttlSecondsAfterFinished.
  ttlSecondsAfterFinished: 3600

# Loki rules sync configuration.
lokiRules:
  # -- Enable the Loki rules sync Job.
  enabled: false

  # -- Image pull secrets for the loki-rules sync Job.
  imagePullSecrets: []
  # -- Node selector for the loki-rules sync Job.
  nodeSelector: {}
  # -- Affinity rules for the loki-rules sync Job.
  affinity: {}
  # -- Tolerations for the loki-rules sync Job.
  tolerations: []
  # -- Topology spread constraints for the loki-rules sync Job.
  topologySpreadConstraints: []
  # -- Resource requests and limits for the loki-rules sync Job.
  resources: {}

  # Source for the Loki rules.
  config:
    # -- One of: configmap, secret, none.
    type: none
    # -- Use an existing ConfigMap/Secret instead of letting the chart create one.
    existingName: ""

  # -- Path inside the container where Loki rule files are mounted (passed to
  # mal-sync as --rules.path).
  rulesPathInContainer: /loki-rules

  # -- Optional temp dir used by mal-sync.
  syncTempDir: ""

  # -- Loki rule files. Each map key becomes a file inside the generated
  # ConfigMap/Secret. Used only when config.existingName is empty.
  rules: {}

  # -- Extra environment variables for the loki-rules sync Job.
  extraEnv: []
  # -- Extra volumes for the loki-rules sync Job.
  extraVolumes: []
  # -- Extra volume mounts for the loki-rules sync Job.
  extraVolumeMounts: []

  # -- Job .spec.backoffLimit.
  backoffLimit: 2
  # -- Job .spec.ttlSecondsAfterFinished.
  ttlSecondsAfterFinished: 3600
