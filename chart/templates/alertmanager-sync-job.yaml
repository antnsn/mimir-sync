{{- if .Values.alertmanager.enabled -}}
{{- $hasBuiltin := ne .Values.alertmanager.config.type "none" -}}
{{- $reload := or $hasBuiltin .Values.alertmanager.config.existingName -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "mimir-sync.fullname" . }}-alertmanager-sync
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mimir-sync.labels" . | nindent 4 }}
    app.kubernetes.io/component: alertmanager-sync
  {{- if or .Values.commonAnnotations $reload }}
  annotations:
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if $reload }}
    reloader.stakater.com/auto: "true"
    {{- end }}
  {{- end }}
spec:
  backoffLimit: {{ .Values.alertmanager.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.alertmanager.ttlSecondsAfterFinished }}
  {{- with .Values.alertmanager.activeDeadlineSeconds }}
  activeDeadlineSeconds: {{ . }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "mimir-sync.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: alertmanager-sync
    spec:
      {{- include "mimir-sync.podScheduling" (dict "ctx" . "feature" .Values.alertmanager) | nindent 6 }}
      containers:
        - name: alertmanager-sync
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ include "mimir-sync.image" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
          {{- with .Values.alertmanager.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            - mal-sync
            - alertmanager
            - --config.file=/config/{{ .Values.alertmanager.config.key }}
            - --templates.dir={{ .Values.alertmanager.templatesPathInContainer }}
            - --mimir.address={{ .Values.mimir.address }}
            - --mimir.id={{ .Values.mimir.tenantId }}
            {{- if .Values.alertmanager.syncTempDir }}
            - --temp.dir={{ .Values.alertmanager.syncTempDir }}
            {{- end }}
          env:
            {{- include "mimir-sync.mimirEnv" . | nindent 12 }}
            {{- with .Values.alertmanager.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if or $hasBuiltin .Values.alertmanager.extraVolumeMounts }}
          volumeMounts:
            {{- if $hasBuiltin }}
            - name: alertmanager-config
              mountPath: /config
              readOnly: true
            {{- end }}
            {{- with .Values.alertmanager.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- if or $hasBuiltin .Values.alertmanager.extraVolumes }}
      volumes:
        {{- if $hasBuiltin }}
        - name: alertmanager-config
          {{- if eq .Values.alertmanager.config.type "configmap" }}
          configMap:
            name: {{ include "mimir-sync.alertmanagerConfigName" . }}
          {{- else if eq .Values.alertmanager.config.type "secret" }}
          secret:
            secretName: {{ include "mimir-sync.alertmanagerConfigName" . }}
          {{- end }}
        {{- end }}
        {{- with .Values.alertmanager.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
{{- end }}
