{{- if .Values.rules.enabled -}}
{{- $hasBuiltin := ne .Values.rules.config.type "none" -}}
{{- $reload := or $hasBuiltin .Values.rules.config.existingName -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "mimir-sync.fullname" . }}-rules-sync
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mimir-sync.labels" . | nindent 4 }}
    app.kubernetes.io/component: rules-sync
  {{- if or .Values.commonAnnotations $reload }}
  annotations:
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if $reload }}
    reloader.stakater.com/auto: "true"
    {{- end }}
  {{- end }}
spec:
  backoffLimit: {{ .Values.rules.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.rules.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "mimir-sync.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: rules-sync
    spec:
      serviceAccountName: {{ include "mimir-sync.serviceAccountName" . }}
      restartPolicy: OnFailure
      {{- with .Values.rules.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.rules.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.rules.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.rules.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.rules.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: rules-sync
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
          {{- with .Values.rules.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            - mal-sync
            - mimir-rules
            - --rules.path={{ .Values.rules.rulesPath }}/
            - --mimir.address={{ .Values.mimir.address }}
            - --mimir.id={{ .Values.mimir.tenantId }}
            - --rules.namespace={{ .Values.namespaces.mimir }}
            {{- if .Values.rules.syncTempDir }}
            - --temp.dir={{ .Values.rules.syncTempDir }}
            {{- end }}
          env:
            - name: MIMIR_ADDRESS
              value: {{ .Values.mimir.address | quote }}
            - name: MIMIR_TENANT_ID
              value: {{ .Values.mimir.tenantId | quote }}
            {{- if .Values.mimir.user }}
            - name: MIMIR_USER
              value: {{ .Values.mimir.user | quote }}
            {{- end }}
            {{- if .Values.mimir.existingSecret.name }}
            - name: MIMIR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mimir.existingSecret.name }}
                  key: {{ .Values.mimir.existingSecret.key }}
            {{- else if .Values.mimir.password }}
            - name: MIMIR_PASSWORD
              value: {{ .Values.mimir.password | quote }}
            {{- end }}
            {{- with .Values.rules.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if or $hasBuiltin .Values.rules.extraVolumeMounts }}
          volumeMounts:
            {{- if $hasBuiltin }}
            - name: rules-config
              mountPath: {{ .Values.rules.rulesPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.rules.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- if or $hasBuiltin .Values.rules.extraVolumes }}
      volumes:
        {{- if $hasBuiltin }}
        - name: rules-config
          {{- if eq .Values.rules.config.type "configmap" }}
          configMap:
            name: {{ include "mimir-sync.rulesConfigName" . }}
          {{- else if eq .Values.rules.config.type "secret" }}
          secret:
            secretName: {{ include "mimir-sync.rulesConfigName" . }}
          {{- end }}
        {{- end }}
        {{- with .Values.rules.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
{{- end }}
