{{- if .Values.rules.enabled -}}
{{- $hasBuiltin := ne .Values.rules.config.type "none" -}}
{{- $reload := or $hasBuiltin .Values.rules.config.existingName -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "mimir-sync.fullname" . }}-rules-sync
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mimir-sync.labels" . | nindent 4 }}
    app.kubernetes.io/component: rules-sync
  {{- if or .Values.commonAnnotations $reload }}
  annotations:
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if $reload }}
    reloader.stakater.com/auto: "true"
    {{- end }}
  {{- end }}
spec:
  backoffLimit: {{ .Values.rules.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.rules.ttlSecondsAfterFinished }}
  {{- with .Values.rules.activeDeadlineSeconds }}
  activeDeadlineSeconds: {{ . }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "mimir-sync.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: rules-sync
    spec:
      {{- include "mimir-sync.podScheduling" (dict "ctx" . "feature" .Values.rules) | nindent 6 }}
      containers:
        - name: rules-sync
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ include "mimir-sync.image" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
          {{- with .Values.rules.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            - mal-sync
            - mimir-rules
            - --rules.path={{ .Values.rules.rulesPath }}/
            - --mimir.address={{ .Values.mimir.address }}
            - --mimir.id={{ .Values.mimir.tenantId }}
            - --rules.namespace={{ .Values.namespaces.mimir }}
            {{- if .Values.rules.syncTempDir }}
            - --temp.dir={{ .Values.rules.syncTempDir }}
            {{- end }}
          env:
            {{- include "mimir-sync.mimirEnv" . | nindent 12 }}
            {{- with .Values.rules.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if or $hasBuiltin .Values.rules.extraVolumeMounts }}
          volumeMounts:
            {{- if $hasBuiltin }}
            - name: rules-config
              mountPath: {{ .Values.rules.rulesPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.rules.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- if or $hasBuiltin .Values.rules.extraVolumes }}
      volumes:
        {{- if $hasBuiltin }}
        - name: rules-config
          {{- if eq .Values.rules.config.type "configmap" }}
          configMap:
            name: {{ include "mimir-sync.rulesConfigName" . }}
          {{- else if eq .Values.rules.config.type "secret" }}
          secret:
            secretName: {{ include "mimir-sync.rulesConfigName" . }}
          {{- end }}
        {{- end }}
        {{- with .Values.rules.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
{{- end }}
