{{- if .Values.lokiRules.enabled -}}
{{- $hasBuiltin := ne .Values.lokiRules.config.type "none" -}}
{{- $reload := or $hasBuiltin .Values.lokiRules.config.existingName -}}
{{- $rulesPath := .Values.lokiRules.rulesPathInContainer | default "/loki-rules" -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "mimir-sync.fullname" . }}-loki-rules-sync
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mimir-sync.labels" . | nindent 4 }}
    app.kubernetes.io/component: loki-rules-sync
  {{- if or .Values.commonAnnotations $reload }}
  annotations:
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if $reload }}
    reloader.stakater.com/auto: "true"
    {{- end }}
  {{- end }}
spec:
  backoffLimit: {{ .Values.lokiRules.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.lokiRules.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "mimir-sync.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: loki-rules-sync
    spec:
      serviceAccountName: {{ include "mimir-sync.serviceAccountName" . }}
      restartPolicy: OnFailure
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.lokiRules.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.lokiRules.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.lokiRules.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.lokiRules.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.lokiRules.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: loki-rules-sync
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
          {{- with .Values.lokiRules.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            - mal-sync
            - loki-rules
            - --rules.path={{ $rulesPath }}
            - --loki.address={{ .Values.loki.address }}
            - --loki.org-id={{ .Values.loki.tenantId }}
            - --rules.namespace={{ .Values.namespaces.loki }}
            {{- if .Values.lokiRules.syncTempDir }}
            - --temp.dir={{ .Values.lokiRules.syncTempDir }}
            {{- end }}
          env:
            - name: LOKI_ADDRESS
              value: {{ .Values.loki.address | quote }}
            - name: LOKI_TENANT_ID
              value: {{ .Values.loki.tenantId | quote }}
            {{- if .Values.loki.user }}
            - name: LOKI_USERNAME
              value: {{ .Values.loki.user | quote }}
            {{- end }}
            {{- if .Values.loki.existingSecret.name }}
            - name: LOKI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.loki.existingSecret.name }}
                  key: {{ .Values.loki.existingSecret.key }}
            {{- else if .Values.loki.password }}
            - name: LOKI_PASSWORD
              value: {{ .Values.loki.password | quote }}
            {{- end }}
            {{- with .Values.lokiRules.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if or $hasBuiltin .Values.lokiRules.extraVolumeMounts }}
          volumeMounts:
            {{- if $hasBuiltin }}
            - name: loki-rules-config
              mountPath: {{ $rulesPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.lokiRules.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- if or $hasBuiltin .Values.lokiRules.extraVolumes }}
      volumes:
        {{- if $hasBuiltin }}
        - name: loki-rules-config
          {{- if eq .Values.lokiRules.config.type "configmap" }}
          configMap:
            name: {{ include "mimir-sync.lokiRulesConfigName" . }}
          {{- else if eq .Values.lokiRules.config.type "secret" }}
          secret:
            secretName: {{ include "mimir-sync.lokiRulesConfigName" . }}
          {{- end }}
        {{- end }}
        {{- with .Values.lokiRules.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
{{- end }}
