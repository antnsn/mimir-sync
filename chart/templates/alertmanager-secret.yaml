{{- if and .Values.alertmanager.enabled (eq .Values.alertmanager.config.type "secret") (not .Values.alertmanager.config.existingName) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mimir-sync.alertmanagerConfigName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mimir-sync.labels" . | nindent 4 }}
    app.kubernetes.io/component: alertmanager-sync
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{ .Values.alertmanager.config.key }}: |
    {{- .Values.alertmanager.configContent | nindent 4 }}
{{- end -}}
